site_name: RTL Buddy
site_description: Python CLI for Verilog and SystemVerilog regression testing, Verilator and VCS simulation workflows, RTL test automation, coverage, and YAML-based verification flows.
site_author: RTL Buddy contributors
repo_url: https://github.com/rtl-buddy/rtl_buddy
repo_name: rtl-buddy/rtl_buddy
docs_dir: docs
site_url: https://rtl-buddy.github.io/rtl_buddy/
remote_name: origin
remote_branch: gh-pages

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.highlight

use_directory_urls: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite

hooks:
  - scripts/gen_cli_reference.py

plugins:
  - search
  - mike:
      alias_type: redirect

nav:
  - Home: index.md
  - Installation: install.md
  - Quick Start: quickstart.md
  - Concepts:
      - Execution Context: concepts/execution-context.md
      - Root Config: concepts/root-config.md
      - Tests: concepts/tests.md
      - Simulators (Verilator vs Icarus): concepts/simulators.md
      - Regressions: concepts/regressions.md
      - Expected Failures (xfail): concepts/expected-failures.md
      - Coverage: concepts/coverage.md
      - Plugins: concepts/plugins.md
      - cocotb: concepts/cocotb.md
      - Spec Traceability: concepts/spec-traceability.md
      - Waveform Viewer: concepts/wave.md
      - Hierarchy Rendering: concepts/hier.md
      - Hub: concepts/hub.md
      - Synthesis: concepts/synthesis.md
      - Place-and-Route: concepts/pnr.md
      - Power Analysis: concepts/power.md
      - FPGA Implementation: concepts/fpga.md
      - CDC Lint: concepts/cdc.md
      - Formal Property Verification: concepts/fpv.md
      - Assertion-Based Verification (sim): concepts/abv-simulation.md
      - Mutation Testing: concepts/mut.md
      - Design-Space Exploration: concepts/xplr.md
      - AXI Profiling: concepts/axi-profile.md
      - Tool Check: concepts/tool-check.md
  - Reference:
      - CLI: reference/cli.md
      - YAML Formats: reference/yaml.md
  - For Agents: agents.md
  - Development:
      - Environment Setup: development/setup.md
      - Engineering Guidelines: development/guidelines.md
      - Documentation Guidelines: development/docs.md
  - Migrations: migrations.md
  - Quirks & Known Issues: known-issues.md
  - Contributing: CONTRIBUTING.md

extra:
  version:
    provider: mike
    default: latest
