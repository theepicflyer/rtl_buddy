name: Docs

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'scripts/gen_cli_reference.py'
      - 'scripts/check_docs_frontmatter.py'
      - 'src/rtl_buddy/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --group docs

      - name: Check generated docs files are up to date
        id: generated
        continue-on-error: true
        run: uv run python scripts/gen_cli_reference.py --check

      - name: Regenerate stale docs files
        if: steps.generated.outcome == 'failure'
        run: uv run python scripts/gen_cli_reference.py

      - name: Commit regenerated docs files
        if: steps.generated.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            exit 0
          fi
          if [[ "${{ github.event.pull_request.head.repo.full_name }}" != "${GITHUB_REPOSITORY}" ]]; then
            echo "Skipping auto-commit for forked pull request."
            exit 0
          fi
          if git diff --quiet -- docs/reference/cli.md; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/reference/cli.md
          git commit -m "docs: regenerate generated docs artifacts"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

      - name: Check docs frontmatter
        run: |
          uv run python scripts/check_docs_frontmatter.py --check || {
            echo ""
            echo "Fix: add a 'description:' frontmatter field to each listed file."
            echo "See docs/CONTRIBUTING.md or run 'rb docs show CONTRIBUTING' for the required format."
            exit 1
          }

      - name: Build docs
        run: uv run mkdocs build --strict

      - name: Check site links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline site/**/*.html
          fail: true

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --group docs

      - name: Require gh-pages token
        env:
          GH_PAGES_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
        run: |
          test -n "$GH_PAGES_TOKEN" || {
            echo "GH_PAGES_TOKEN is required to push the gh-pages branch for GitHub Pages branch publishing."
            exit 1
          }

      - name: Configure git remote
        env:
          GH_PAGES_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_PAGES_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Fetch gh-pages branch if it exists
        run: git fetch origin gh-pages --depth=1 || true

      - name: Compute docs target
        id: target
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME#v}"
            major="${tag%%.*}"
            version="v${major}"
            highest_major="$(git tag --list 'v*.*.*' | sed -E 's/^v([0-9]+)\..*/\1/' | sort -n | tail -1)"
            update_latest=false
            if [[ -n "${highest_major}" && "${major}" == "${highest_major}" ]]; then
              update_latest=true
            fi
            echo "version=${version}" >> "$GITHUB_OUTPUT"
            echo "update_latest=${update_latest}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
            echo "update_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy docs version
        run: |
          if [[ "${{ steps.target.outputs.update_latest }}" == "true" ]]; then
            uv run mike deploy --branch gh-pages --update-aliases "${{ steps.target.outputs.version }}" latest
          else
            uv run mike deploy --branch gh-pages --update-aliases "${{ steps.target.outputs.version }}"
          fi

      - name: Set default docs version
        if: steps.target.outputs.update_latest == 'true'
        run: uv run mike set-default --branch gh-pages latest

      - name: Push gh-pages
        run: git push origin gh-pages
