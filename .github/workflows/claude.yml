name: Claude Code

on:
  pull_request:
    types: [opened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'pull_request' && !github.event.pull_request.draft) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read  # Required for Claude to read CI results on PRs
    steps:
      - name: Check maintainer team membership
        uses: actions/github-script@v8
        with:
          script: |
            try {
              const { data } = await github.rest.teams.getMembershipForUserInOrg({
                org: context.repo.owner,
                team_slug: 'maintainers',
                username: context.actor,
              });
              if (data.state !== 'active') {
                core.setFailed(`${context.actor} is not an active member of the maintainers team`);
              }
            } catch {
              core.setFailed(`${context.actor} is not in the maintainers team`);
            }

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          additional_permissions: |
            actions: read
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          claude_args: |
            --allowedTools Read,Write,Edit,Bash(git:*),mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE / PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

            Before doing anything else, read the following files and treat them as
            authoritative axioms for this repository. All feedback, suggestions, and
            changes must be consistent with them:
              - docs/development/guidelines.md  (engineering rules: execution contexts,
                path ownership, artifact layout, subprocesses, dependencies, logging,
                errors, validation, releases, issue triage, milestones)
              - docs/development/docs.md        (documentation authoring rules)

            If this workflow was triggered by a PR being opened, marked ready for
            review (no comment), or a comment asking you to review, perform a review 
            of the code against the development guidelines. Your main job is to highlight 
            how well the implementation adheres to it.

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) 
            to highlight specific code issues.
            Only post GitHub comments - don't submit review text as messages.

            Otherwise, the triggering comment and PR context are provided above.
            Perform the instructions from that comment.
