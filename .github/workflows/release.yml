name: Release

run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
    && format('Release ({0}{1}) from {2}', inputs.bump, inputs.pre_release == 'true' && ', pre-release' || '', github.ref_name)
    || format('Release from PR #{0} ({1})', github.event.pull_request.number, github.head_ref) }}

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      pre_release:
        description: 'Mark as pre-release (appends rcN suffix, PEP 440)'
        required: false
        type: boolean
        default: false
      description:
        description: 'Release description (optional)'
        required: false
        type: string

jobs:
  release:
    if: (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.pull_request.merge_commit_sha }}

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi

          VERSION=${LATEST#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          IS_PRERELEASE=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP_TYPE="${{ inputs.bump }}"
            if [ "${{ inputs.pre_release }}" = "true" ]; then
              IS_PRERELEASE=true
            fi
          else
            LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
            if echo "$LABELS" | grep -qi '"version/major"'; then
              BUMP_TYPE="major"
            elif echo "$LABELS" | grep -qi '"version/minor"'; then
              BUMP_TYPE="minor"
            elif echo "$LABELS" | grep -qi '"version/patch"'; then
              BUMP_TYPE="patch"
            else
              echo "No version label found, skipping release."
              echo "new_tag=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if [ "$BUMP_TYPE" = "major" ]; then
            BASE_TAG="v$((MAJOR + 1)).0.0"
          elif [ "$BUMP_TYPE" = "minor" ]; then
            BASE_TAG="v${MAJOR}.$((MINOR + 1)).0"
          else
            BASE_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          if [ "$IS_PRERELEASE" = "true" ]; then
            RC_COUNT=$(git tag --list "${BASE_TAG}rc*" | wc -l | tr -d ' ')
            RC_NUM=$((RC_COUNT + 1))
            NEW_TAG="${BASE_TAG}rc${RC_NUM}"
          else
            NEW_TAG="${BASE_TAG}"
          fi

          echo "latest_tag=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${LATEST} -> ${NEW_TAG}"

      - name: Log release parameters
        run: |
          echo "Version : ${{ steps.version.outputs.new_tag || '(none — no version label on PR)' }}"
          echo "Branch  : ${{ github.event_name == 'workflow_dispatch' && github.ref_name || github.head_ref }}"
          echo "Trigger : ${{ github.event_name }}"

      - name: Require release token
        if: steps.version.outputs.new_tag != ''
        env:
          GH_PAGES_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
        run: |
          test -n "$GH_PAGES_TOKEN" || {
            echo "GH_PAGES_TOKEN is required so release-created tags trigger downstream docs publishing."
            exit 1
          }

      - name: Configure git remote
        if: steps.version.outputs.new_tag != ''
        env:
          GH_PAGES_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_PAGES_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Create and push tag
        if: steps.version.outputs.new_tag != ''
        run: |
          TAG="${{ steps.version.outputs.new_tag }}"
          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists, skipping tag creation."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub release
        if: steps.version.outputs.new_tag != ''
        uses: actions/github-script@v8
        env:
          TAG: ${{ steps.version.outputs.new_tag }}
          PREV_TAG: ${{ steps.version.outputs.latest_tag }}
          IS_PRERELEASE: ${{ steps.version.outputs.is_prerelease }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_USER: ${{ github.event.pull_request.user.login }}
          DESCRIPTION: ${{ inputs.description }}
          ACTOR: ${{ github.actor }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
        with:
          script: |
            const tag = process.env.TAG;
            const prevTag = process.env.PREV_TAG;
            const isPrerelease = process.env.IS_PRERELEASE === 'true';
            let body;
            if (context.eventName === 'workflow_dispatch') {
              body = process.env.DESCRIPTION || `Manual release triggered by @${process.env.ACTOR}`;
            } else {
              body = `**PR #${process.env.PR_NUMBER}** by @${process.env.PR_USER}: ${process.env.PR_TITLE}`;
            }

            if (prevTag && prevTag !== 'v0.0.0') {
              body += `\n\n**Full changelog:** ${process.env.SERVER_URL}/${process.env.REPO}/compare/${prevTag}...${tag}`;
            }

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body,
              draft: false,
              prerelease: isPrerelease,
            });

  build:
    needs: release
    if: needs.release.outputs.new_tag != ''
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.new_tag }}

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Build package
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish_docs:
    needs: release
    if: needs.release.outputs.new_tag != '' && needs.release.outputs.is_prerelease != 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.new_tag }}
          persist-credentials: false

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --group docs

      - name: Configure git remote
        env:
          GH_PAGES_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
        run: |
          test -n "$GH_PAGES_TOKEN" || {
            echo "GH_PAGES_TOKEN is required to publish release docs to the gh-pages branch."
            exit 1
          }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_PAGES_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Fetch gh-pages branch if it exists
        run: git fetch origin gh-pages --depth=1 || true

      - name: Compute docs target
        id: target
        shell: bash
        run: |
          tag="${{ needs.release.outputs.new_tag }}"
          major="${tag#v}"
          major="${major%%.*}"
          version="v${major}"
          highest_major="$(git tag --list 'v*.*.*' | sed -E 's/^v([0-9]+)\..*/\1/' | sort -n | tail -1)"
          update_latest=false
          if [[ -n "${highest_major}" && "${major}" == "${highest_major}" ]]; then
            update_latest=true
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "update_latest=${update_latest}" >> "$GITHUB_OUTPUT"

      - name: Deploy docs version
        run: |
          if [[ "${{ steps.target.outputs.update_latest }}" == "true" ]]; then
            uv run mike deploy --branch gh-pages --update-aliases "${{ steps.target.outputs.version }}" latest
          else
            uv run mike deploy --branch gh-pages --update-aliases "${{ steps.target.outputs.version }}"
          fi

      - name: Set default docs version
        if: steps.target.outputs.update_latest == 'true'
        run: uv run mike set-default --branch gh-pages latest

      - name: Push gh-pages
        run: git push origin gh-pages

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/rtl_buddy
    permissions:
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
